name: Verificações de Segurança

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Semanalmente aos domingos

permissions:
  contents: read
  security-events: write

jobs:
  seguranca:
    name: Auditoria de Segurança
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar auditoria npm
        run: npm audit --audit-level=critical || true

      - name: Executar auditoria npm (modo restrito)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm audit --audit-level=critical # O pipeline só vai travar se for algo REALMENTE perigoso

      - name: Verificar dependências vulneráveis
        run: |
          npm audit --json > audit.json || true
          cat audit.json

  revisao-dependencias:
    name: Revisão de Dependências
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Requer Dependency Graph habilitado nas configurações do repositório
    continue-on-error: true
    if: github.event_name == 'pull_request'
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Revisar dependências
        uses: actions/dependency-review-action@v4
