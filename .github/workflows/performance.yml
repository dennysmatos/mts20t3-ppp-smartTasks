name: Testes de Performance K6

on:
  workflow_dispatch:
    inputs:
      cenario:
        description: 'Cenário a executar'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - carga
          - estresse
          - todos
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1' # Toda segunda-feira às 3h (UTC)

permissions:
  contents: read
  pull-requests: write

jobs:
  performance:
    name: Testes de Performance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Instalar dependências Node.js
        run: npm ci

      - name: Instalar K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version

      - name: Configurar variáveis de ambiente
        run: cp .env.example .env

      - name: Criar diretório de relatórios
        run: mkdir -p relatorios

      - name: Iniciar servidor da API
        run: |
          npm start &
          echo "Aguardando o servidor responder..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Servidor pronto após $i tentativas."
              break
            fi
            echo "Tentativa $i/30 — aguardando 2s..."
            sleep 2
          done
          curl -sf http://localhost:3000/health || (echo "Servidor não iniciou!" && exit 1)

      - name: Executar Smoke Test
        run: k6 run test/performance/cenarios/smoke.js

      - name: Executar Teste de Carga
        if: >
          github.event.inputs.cenario == 'carga' ||
          github.event.inputs.cenario == 'todos' ||
          github.event_name == 'schedule'
        run: k6 run test/performance/cenarios/carga.js

      - name: Executar Teste de Estresse
        if: >
          github.event.inputs.cenario == 'estresse' ||
          github.event.inputs.cenario == 'todos'
        run: k6 run test/performance/cenarios/estresse.js

      - name: Publicar relatórios de performance
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-k6-${{ github.run_id }}
          path: relatorios/
          retention-days: 30

      - name: Comentar no PR com resumo de performance
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const jsonPath = './relatorios/smoke.json';

            if (!fs.existsSync(jsonPath)) {
              console.log('Arquivo smoke.json não encontrado, pulando comentário.');
              return;
            }

            const data = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
            const dr = data.metrics?.http_req_duration?.values;
            const falhas = data.metrics?.http_req_failed?.values;
            const reqs = data.metrics?.http_reqs?.values;
            const checks = data.metrics?.checks?.values;

            const ms = (v) => v != null ? `${v.toFixed(0)} ms` : 'N/A';
            const pct = (v) => v != null ? `${(v * 100).toFixed(2)}%` : 'N/A';
            const totalChecks = (checks?.passes ?? 0) + (checks?.fails ?? 0);
            const taxaSucesso = totalChecks > 0
              ? `${((checks.passes / totalChecks) * 100).toFixed(2)}%`
              : 'N/A';
            const emoji = (falhas?.rate ?? 0) < 0.01 ? '✅' : '❌';

            const corpo = [
              '## 🚀 Relatório de Performance K6 — Smoke Test',
              '',
              `${emoji} **Taxa de Erros:** ${pct(falhas?.rate)}`,
              '',
              '| Métrica | Valor |',
              '|---------|-------|',
              `| Total de Requisições | ${reqs?.count ?? 'N/A'} |`,
              `| Req/segundo | ${reqs?.rate?.toFixed(2) ?? 'N/A'} |`,
              `| Duração média | ${ms(dr?.avg)} |`,
              `| Duração P95 | ${ms(dr?.['p(95)'])} |`,
              `| Duração P99 | ${ms(dr?.['p(99)'])} |`,
              `| Duração máxima | ${ms(dr?.max)} |`,
              `| Taxa de sucesso (checks) | ${taxaSucesso} |`,
              '',
              `[Ver relatório completo nos artefatos](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: corpo,
            });
