name: Relatório de Cobertura de Código

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  cobertura:
    name: Análise de Cobertura
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar relatório de cobertura
        run: npm run coverage

      - name: Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-cobertura
          path: coverage
          retention-days: 30

      - name: Comentar no PR com resumo de cobertura
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lcovSummary = fs.readFileSync('./coverage/lcov-report/index.html', 'utf8');

            const match = lcovSummary.match(/class="fraction"><strong>(\d+\.\d+%)<\/strong>/);
            const coverage = match ? match[1] : 'N/A';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Relatório de Cobertura\n\n**Cobertura Geral:** ${coverage}\n\n[Ver relatório completo](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })
