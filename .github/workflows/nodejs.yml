name: Integração Contínua Node.js

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Verificação de Lint e Formatação
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar ESLint
        run: npm run lint

      - name: Verificar formatação com Prettier
        run: npm run prettier

  test:
    name: Suite de Testes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes com cobertura
        run: npm run coverage

      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-cobertura
          path: coverage
          retention-days: 30

      - name: Publicar resultados JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-testes-junit
          path: junit.xml
          retention-days: 30

      - name: Executar testes funcionais
        run: npm run test:functional

      - name: Publicar resultados dos testes Mocha
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-testes-mocha
          path: reports/mocha
          retention-days: 30

      - name: Comentar no PR com resultados dos testes
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = fs.existsSync('./junit.xml') ? '✅ Testes unitários passaram' : '❌ Testes unitários falharam';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Resultados dos Testes\n${testResults}`
            })
