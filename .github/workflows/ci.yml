name: CI

on:
   push:
      branches:
         - main
         - master
         - 'codex/**'
   pull_request:
      branches:
         - main
         - master

jobs:
   test:
      name: Run automated tests
      runs-on: ubuntu-latest

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Setup Node.js
           uses: actions/setup-node@v4
           with:
              node-version: 24
              cache: npm

         - name: Install dependencies
           run: npm ci

         - name: Run test suite
           run: npm test
